# Change the server ip and all the required the certificates data accordingly
apiVersion: v1
kind: Config

#TODO: Add a mount volume to the default cluster config on the vm
# this would allow for automatic access to the certificates generated by the cluster
clusters:
- name: box-game-cluster
  cluster:
    server: #server-ip
    # certificate-authority-data:  -- use for https

users:
- name: my-user
  user:
    # client-certificate-data:  -- use for https
     # client-key-data: -- use for https

contexts:
- name: dev-context
  context:
    cluster: box-game-cluster
    user: my-user
    namespace: default

current-context: dev-context
